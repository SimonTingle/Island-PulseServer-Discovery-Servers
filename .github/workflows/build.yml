name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'server-discovery-app/package-lock.json'

      - name: Install dependencies
        working-directory: server-discovery-app
        run: npm ci

      - name: Build app
        working-directory: server-discovery-app
        run: npm run build

      - name: Run linter
        working-directory: server-discovery-app
        run: npm run lint
        continue-on-error: true
